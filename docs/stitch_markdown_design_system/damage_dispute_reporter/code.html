                    "borderRadius": {

                        "margin-mobile": "16px",
                        "base": "8px",
                        "gap-lg": "16px"
                    },
                    "fontFamily": {
                        "label-bold": ["inter"],
                        "headline-lg": ["manrope"],
                        "title-md": ["manrope"],
                        "headline-md": ["manrope"],

                        "body-lg": ["inter"],
                        "caption": ["inter"]
                    },
                    "fontSize": {

                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
                    }
                }
            }
        }
    }catch(_e){}</script></head><body class="bg-app-bg text-on-background min-h-screen flex items-center justify-center font-body-lg antialiased">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-inverse-surface/40 backdrop-blur-sm z-40 transition-opacity"></div>
<!-- Bottom Sheet -->
<div class="fixed bottom-0 left-0 right-0 z-50 bg-surface rounded-t-[24px] shadow-2xl transform transition-transform duration-300 md:max-w-xl md:mx-auto md:relative md:rounded-xl">
<!-- Drag Indicator (Mobile) -->
<div class="w-full flex justify-center pt-gap-md pb-gap-sm md:hidden">
<div class="w-12 h-1.5 bg-outline-variant rounded-full"></div>
</div>
<div class="p-margin-mobile md:p-gap-xl pt-0 md:pt-gap-xl flex flex-col gap-gap-xl max-h-[795px] overflow-y-auto scrollbar-hide">
<!-- Header Bar -->
<div class="flex items-center justify-between pb-gap-md border-b border-outline-variant">
<h2 class="font-headline-md text-headline-md text-on-surface">Report Return Damage / Issues</h2>
<button class="h-touch-target w-touch-target flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors" aria-label="Close">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<!-- Content Area -->
<form class="flex flex-col gap-gap-xl">
<!-- Dispute Selection Group -->
<fieldset class="flex flex-col gap-gap-md">
<legend class="font-title-md text-title-md text-on-surface mb-gap-sm">What is the issue?</legend>
<label class="flex items-start gap-gap-md p-gap-md border border-outline-variant rounded-lg hover:bg-surface-container-lowest cursor-pointer transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-container/10">
<div class="flex items-center h-5 mt-0.5">
<input type="radio" name="dispute_reason" class="w-5 h-5 text-primary border-outline focus:ring-primary focus:ring-offset-surface">
</div>
<div class="flex flex-col">
<span class="font-label-bold text-label-bold text-on-surface">Item returned damaged / not working</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Physical damage or malfunction noted upon return.</span>
</div>
</label>
<label class="flex items-start gap-gap-md p-gap-md border border-outline-variant rounded-lg hover:bg-surface-container-lowest cursor-pointer transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-container/10">
<div class="flex items-center h-5 mt-0.5">
<input type="radio" name="dispute_reason" class="w-5 h-5 text-primary border-outline focus:ring-primary focus:ring-offset-surface">
</div>
<div class="flex flex-col">
<span class="font-label-bold text-label-bold text-on-surface">Renter did not return the item</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">The rental period has ended and the item is missing.</span>
</div>
</label>
<label class="flex items-start gap-gap-md p-gap-md border border-outline-variant rounded-lg hover:bg-surface-container-lowest cursor-pointer transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-container/10">
<div class="flex items-center h-5 mt-0.5">
<input type="radio" name="dispute_reason" class="w-5 h-5 text-primary border-outline focus:ring-primary focus:ring-offset-surface">
</div>
<div class="flex flex-col">
<span class="font-label-bold text-label-bold text-on-surface">Unpaid rental balances or outstanding dues</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Late fees or extended rental costs not settled.</span>
</div>
</label>
</fieldset>
<!-- Details Input Field -->
<div class="flex flex-col gap-gap-sm">
<label for="damage_details" class="font-label-bold text-label-bold text-on-surface">Details</label>
<textarea id="damage_details" rows="4" class="w-full p-gap-md border border-outline-variant rounded-lg bg-surface text-on-surface font-body-lg text-body-lg focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-text-muted resize-none transition-colors" placeholder="Describe damage details... Be as specific as possible regarding the condition prior to rental and current state."></textarea>
</div>
<!-- Photo Upload Slots -->
<div class="flex flex-col gap-gap-sm">
<label class="font-label-bold text-label-bold text-on-surface">Evidence Photos</label>
<span class="font-body-sm text-body-sm text-text-muted mb-base">Upload up to 3 photos clearly showing the issue.</span>
<div class="flex gap-gap-md">
<button type="button" class="w-[72px] h-[72px] rounded-lg border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-text-muted hover:border-primary hover:text-primary transition-colors hover:bg-surface-container-lowest">
<span class="material-symbols-outlined text-[24px]">add_a_photo</span>
</button>
<button type="button" class="w-[72px] h-[72px] rounded-lg border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-text-muted hover:border-primary hover:text-primary transition-colors hover:bg-surface-container-lowest">
<span class="material-symbols-outlined text-[24px]">add_a_photo</span>
</button>
<button type="button" class="w-[72px] h-[72px] rounded-lg border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-text-muted hover:border-primary hover:text-primary transition-colors hover:bg-surface-container-lowest">
<span class="material-symbols-outlined text-[24px]">add_a_photo</span>
</button>
</div>
</div>
<!-- Bottom Section / Action Buttons -->
<div class="flex flex-col gap-gap-md pt-gap-md border-t border-outline-variant mt-base">
<button type="button" class="w-full h-[52px] bg-danger text-on-error font-label-bold text-label-bold rounded-lg flex items-center justify-center gap-base hover:bg-error transition-colors">
<span class="material-symbols-outlined text-[20px]">report</span>
                        SUBMIT DISPUTE &amp; REPORT ISSUE
                    </button>
<button class="w-full h-[52px] bg-transparent border-2 border-on-surface text-on-surface font-label-bold text-label-bold rounded-lg flex items-center justify-center gap-base hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">download</span>
                        DOWNLOAD CONTRACT &amp; RENTER ID
                    </button>
</div>
</form>
</div>
</div>
<style>
        /* Minimal custom CSS for scrollbar hiding if needed */

            display: none;
        }

            scrollbar-width: none;
        }
    </style>
</body></html>
