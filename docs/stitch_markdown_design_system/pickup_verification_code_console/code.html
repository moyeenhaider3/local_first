<script>
        // Simple auto-focus and button state logic for the OTP inputs
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input[type="number"]');
            const verifyBtn = document.getElementById('verify-btn');

            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    // Restrict to single digit
                    if (e.target.value.length > 1) {
                        e.target.value = e.target.value.slice(0, 1);
                    }
                    
                    // Auto-advance
                    if (e.target.value !== '' && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }

                    // Check if all filled to enable button
                    let allFilled = true;
                    inputs.forEach(i => {
                        if (i.value === '') allFilled = false;
                    });

                    if (allFilled) {
                        verifyBtn.classList.remove('bg-text-muted', 'pointer-events-none', 'opacity-80');
                        verifyBtn.classList.add('bg-primary', 'hover:bg-primary-container', 'hover:text-on-primary-container', 'active:scale-[0.98]');
                    } else {
                        verifyBtn.classList.add('bg-text-muted', 'pointer-events-none', 'opacity-80');
                        verifyBtn.classList.remove('bg-primary', 'hover:bg-primary-container', 'hover:text-on-primary-container', 'active:scale-[0.98]');
                    }
                });

                // Handle backspace
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].value = '';
                    }
                });
            });
            
            // Focus first input on load
            setTimeout(() => {
                if(inputs.length > 0) inputs[0].focus();
            }, 400);
        });
    </script>
